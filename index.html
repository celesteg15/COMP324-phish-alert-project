<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>PhishQuiz</title>
 <link rel="preconnect" href="https://fonts.googleapis.com" />
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
 <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet" />
 <link rel="stylesheet" href="./styles.css" />
</head>

<body>
 <main class="container">
   <h1 class="site-title">PhishQuiz</h1>
    <p id="score-line">Score: 0/0 correct (0%)</p>

  <!-- Added difficulty-filter UI so users can view Easy, Medium, Hard, or all scenarios -->
  <section class="controls-card card" aria-label="Quiz filters">
    <label for="difficulty-filter"><strong>Difficulty:</strong></label>
    <select id="difficulty-filter">
      <option value="all">All difficulties</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
  </section>

   <section class="card" aria-label="Message scenario">
     <div class="meta">
       <div><strong>From:</strong> <span id="sender">—</span></div>
       <div><strong>Subject:</strong> <span id="subject">—</span></div>
       <div><strong>Type:</strong> <span id="type">—</span></div>
       <div><strong>Difficulty:</strong> <span id="difficulty">—</span></div>
     </div>

     <p id="content" class="content">Loading...</p>
   </section>

<!-- Old answer buttons:
   <section class="actions" aria-label="Answer choices">
     <button type="button" id="btn-phishing">Phishing</button>
     <button type="button" id="btn-legitimate">Legitimate</button>
     <button type="button" id="btn-hint">Show Hint</button>
   </section>
   New answer choice container, buttons are now rendered dynamically by the AnswerChoices component:
-->
   <section class="actions" id="answer-actions" aria-label="Answer choices"></section> 
   
   <section class="card hint-card" id="hint-box" aria-label="Hint" hidden>
     <h2>Hint</h2>
     <p id="hint-text" class="hint-text"></p>
   </section>

   <section class="actions" aria-label="Quiz controls">
   <button type="button" id="btn-hint" disabled>Show Hint</button> 
   <button type="button" id="btn-submit" disabled>Submit</button>
   <button type="button" id="btn-next" disabled>Next</button>   
   </section>

   <section class="card" aria-label="Feedback">
     <h2>Feedback</h2>
     <div id="feedback" class="feedback">Submit your answer to see feedback.</div>
     <div id="retry-container" class="retry-area"></div>
   </section>
 </main>

 <script type="module" src="./refactor/main.js"></script>
</body>
</html>
